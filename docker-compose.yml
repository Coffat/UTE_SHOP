version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: uteshop_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=uteshop

  redis:
    image: redis:alpine
    container_name: uteshop_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  mongodb_data:
